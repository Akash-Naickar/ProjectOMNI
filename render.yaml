services:
  # Python Backend API
  - type: web
    name: project-omni-backend
    runtime: docker
    dockerContext: python-backend
    dockerfilePath: python-backend/Dockerfile
    plan: free
    region: singapore # Adjust as needed
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATA_PATH
        value: "/app/data/cleaned_crop_data.csv"
