name: haskell-pipeline
version: 0.1.0.0
synopsis: "Recursive analytics pipeline for sustainable crop yield projections"
description: "Haskell data ingestion & scrubbing engine for FAOSTAT crop yield data. Demonstrates lazy evaluation, conduit streaming, monadic error handling, and recursive analytics."
license: MIT
author: Student
category: Data

dependencies:
  - base >= 4.7 && < 5
  - cassava >= 0.5
  - bytestring >= 0.11
  - vector >= 0.12
  - containers >= 0.6
  - conduit >= 1.3
  - conduit-extra >= 1.3
  - resourcet >= 1.2

library:
  source-dirs: src
  exposed-modules:
    - CropPipeline.Types
    - CropPipeline.Validation
    - CropPipeline.Analytics
    - CropPipeline.Pipeline

executables:
  crop-pipeline:
    main: Main.hs
    source-dirs: app
    dependencies:
      - haskell-pipeline
    ghc-options:
      - -O2
      - -Wall
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
